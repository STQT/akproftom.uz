{% load i18n %}
{% translate "Оставить заявку" as t_title %}
{% translate "Заполните форму — мы рассчитаем стоимость и свяжемся с вами." as t_sub %}
<div class="modal" id="inquiry-modal" hidden>
  <div class="modal__overlay js-close-modal"></div>
  <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="inquiry-modal-title">
    <button class="modal__close js-close-modal" aria-label="{% trans 'Закрыть' %}">×</button>
    {% include "includes/_inquiry_form.html" with form_title=t_title form_subtitle=t_sub %}
  </div>
</div>
