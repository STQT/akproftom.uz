{% load i18n %}
<article class="card">
  <a class="card__media" href="{{ product.get_absolute_url }}">
    {% if product.main_image %}
      <img src="{{ product.main_image.url }}" alt="{{ product.name }}" loading="lazy">
    {% else %}
      <span class="card__placeholder">{{ product.name|first }}</span>
    {% endif %}
  </a>
  <div class="card__body">
    <span class="card__cat">{{ product.category.name }}</span>
    <h3 class="card__title"><a href="{{ product.get_absolute_url }}">{{ product.name }}</a></h3>
    {% if product.short_description %}
      <p class="card__desc">{{ product.short_description }}</p>
    {% endif %}
    <div class="card__footer">
      <a class="btn btn--outline btn--sm" href="{{ product.get_absolute_url }}">{% trans "Подробнее" %}</a>
      <button type="button" class="btn btn--accent btn--sm js-open-modal" data-product="{{ product.id }}">{% trans "Цена" %}</button>
    </div>
  </div>
</article>
