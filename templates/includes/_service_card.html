{% load i18n %}
<article class="card">
  <a class="card__media" href="{{ service.get_absolute_url }}">
    {% if service.image %}
      <img src="{{ service.image.url }}" alt="{{ service.title }}" loading="lazy">
    {% else %}
      <span class="card__placeholder">{{ service.title|first }}</span>
    {% endif %}
  </a>
  <div class="card__body">
    {% if service.group %}<span class="card__cat">{{ service.group.title }}</span>{% endif %}
    <h3 class="card__title"><a href="{{ service.get_absolute_url }}">{{ service.title }}</a></h3>
    {% if service.short_description %}
      <p class="card__desc">{{ service.short_description }}</p>
    {% endif %}
    <div class="card__footer">
      <a class="btn btn--outline btn--sm" href="{{ service.get_absolute_url }}">{% trans "Подробнее" %}</a>
      <button type="button" class="btn btn--accent btn--sm js-open-modal">{% trans "Заказать" %}</button>
    </div>
  </div>
</article>
